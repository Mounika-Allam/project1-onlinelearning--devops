<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Java Masterclass | Learning Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background-color: #f3f4f6; overflow: hidden; }
        .sidebar { width: 360px; background: white; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; padding: 25px; box-shadow: 4px 0 15px rgba(0,0,0,0.03); z-index: 10; }
        h2 { font-size: 1.4rem; color: #e76f51; margin-bottom: 20px; font-weight: 700; }
        .video-list { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; padding-right: 5px; }
        .video-item { padding: 14px; margin-bottom: 10px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 10px; cursor: pointer; transition: 0.2s; font-weight: 500; color: #4b5563; display: flex; align-items: center; }
        .video-item:hover { background: #fff4ed; border-color: #e76f51; color: #e76f51; transform: translateX(4px); }
        .add-video-form { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px dashed #e76f51; }
        .add-video-form h4 { margin: 0 0 10px 0; font-size: 0.9rem; color: #64748b; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.85rem; }
        .add-btn { width: 100%; padding: 10px; background: #e76f51; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .main-display { flex-grow: 1; display: flex; align-items: center; justify-content: center; background-color: #f3f4f6; position: relative; }
        .video-container { display: none; width: 92%; height: 88%; background: #000; border-radius: 16px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4); overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .empty-state { text-align: center; color: #9ca3af; }
        .exit-link { position: absolute; top: 20px; right: 25px; text-decoration: none; color: #94a3b8; font-weight: 500; }
        
        /* Added a clear button style */
        .clear-btn { background: none; border: none; color: #94a3b8; font-size: 0.7rem; cursor: pointer; margin-top: 10px; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Java Masterclass</h2>
        <div class="video-list" id="lessonList">
            <div class="video-item" onclick="playVid('https://www.youtube.com/embed/eIrMbAQSU34', 'Intro')">Lesson 1: Java Basics</div>
            <div class="video-item" onclick="playVid('https://www.youtube.com/embed/grEKMHGYyns', 'Variables')">Lesson 2: Variables & Types</div>
            <div class="video-item" onclick="playVid('https://www.youtube.com/embed/UmnCZ7-9yDY', 'Logic')">Lesson 3: Control Flow</div>
            <div class="video-item" onclick="playVid('https://www.youtube.com/embed/GoXwIVyNvX0', 'OOP')">Lesson 4: Object Oriented Programming</div>
        </div>
        <div class="add-video-form">
            <h4>+ Add Custom Lesson</h4>
            <input type="text" id="vidTitle" placeholder="Lesson Title">
            <input type="text" id="vidUrl" placeholder="YouTube Embed URL">
            <button class="add-btn" onclick="addNewLesson()">Add to List</button>
            <center><button class="clear-btn" onclick="clearLessons()">Reset Custom Lessons</button></center>
        </div>
        <div style="margin-top: 20px; text-align: center;"><a th:href="@{/courses}" style="color: #64748b; text-decoration: none; font-size: 0.85rem;">← Return to Dashboard</a></div>
    </div>
    <div class="main-display">
        <a th:href="@{/courses}" class="exit-link">Exit Player ✕</a>
        <div id="waiting" class="empty-state">
            <div style="font-size: 3rem; margin-bottom: 10px;">☕</div>
            <p>Select a Java lesson to begin</p>
        </div>
        <div id="playerBox" class="video-container"><iframe id="videoIframe" allowfullscreen></iframe></div>
    </div>

    <script>
        // --- PERMANENT STORAGE LOGIC ---
        
        // Load saved lessons from browser memory on startup
        let savedLessons = JSON.parse(localStorage.getItem('java_custom_lessons')) || [];
        let lessonCount = 4 + savedLessons.length;

        // Display saved lessons when page loads
        window.onload = function() {
            const list = document.getElementById('lessonList');
            savedLessons.forEach((lesson, index) => {
                const newItem = document.createElement('div');
                newItem.className = 'video-item';
                let currentNum = 5 + index;
                newItem.innerText = `Lesson ${currentNum}: ${lesson.title}`;
                newItem.onclick = function() { playVid(lesson.url, lesson.title); };
                list.appendChild(newItem);
            });
        };

        function playVid(url, title) {
            document.getElementById('waiting').style.display = 'none';
            document.getElementById('playerBox').style.display = 'block';
            document.getElementById('videoIframe').src = url;
        }

        function addNewLesson() {
            const tInput = document.getElementById('vidTitle');
            const uInput = document.getElementById('vidUrl');
            
            if (tInput.value === "" || uInput.value === "") return alert("Please fill both!");

            const title = tInput.value;
            const url = uInput.value;

            // 1. Add to the Permanent Storage (LocalStorage)
            savedLessons.push({ title: title, url: url });
            localStorage.setItem('java_custom_lessons', JSON.stringify(savedLessons));

            // 2. Update the Screen
            lessonCount++;
            const list = document.getElementById('lessonList');
            const newItem = document.createElement('div');
            newItem.className = 'video-item';
            newItem.innerText = `Lesson ${lessonCount}: ${title}`;
            newItem.onclick = function() { playVid(url, title); };
            
            list.appendChild(newItem);

            // 3. Clear the boxes
            tInput.value = ""; 
            uInput.value = "";
        }

        function clearLessons() {
            if(confirm("This will delete all lessons you added manually. Continue?")) {
                localStorage.removeItem('java_custom_lessons');
                location.reload(); // Refresh page to clear the list
            }
        }
    </script>
</body>
</html>
