apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-learning-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: online-learning-app
  template:
    metadata:
      labels:
        app: online-learning-app
    spec:
      containers:
        - name: online-learning-container
          image: allammounika/online-learning:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083